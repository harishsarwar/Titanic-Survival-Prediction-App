<!DOCTYPE html>
<html>
<head><title>Register</title></head>
<body>
    <h2>Register / Login</h2>
    <p>New user? Enter a new User ID. Existing user? Enter your existing User ID to see your predictions.</p>

    <form action="/register" method="post">

        <label>User ID:</label><br>
        <input type="text" name="user_id" placeholder="e.g. harrish01" required>
        <br><br>

        <label>Name:</label><br>
        <input type="text" name="name" placeholder="e.g. Harrish" required>
        <br><br>

        <input type="submit" value="Continue">
    </form>
</body>
</html>
